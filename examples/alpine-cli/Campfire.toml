[campfire]
image = "docker.io/library/alpine@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc"
shell = "/bin/sh"

[workspace]
path = "/workspace"

[env]
set = { CAMPFIRE_EXAMPLE = "alpine-cli" }

[tools.alpine]
check = "cat /etc/alpine-release"
contains = "3.20.10"

[tools.busybox]
check = "busybox | head -n 1"
contains = "BusyBox v1.36.1"

[tools.env]
check = "test \"$CAMPFIRE_EXAMPLE\" = \"alpine-cli\" && echo campfire-env-ok"
contains = "campfire-env-ok"

[commands.versions]
run = "cat /etc/alpine-release && busybox | head -n 1"
description = "Print pinned Alpine and BusyBox versions"

[commands.write_note]
run = "printf 'written inside campfire\n' > /workspace/generated.txt"
description = "Write a host-visible file from inside campfire"

[commands.serve_http]
run = "while true; do { printf 'HTTP/1.1 200 OK\\r\\nConnection: close\\r\\n\\r\\n'; cat /workspace/message.txt; } | nc -l -p 8080; done"
description = "Serve this example directory from inside campfire"

[[ports]]
container = 8080
host = 18080
